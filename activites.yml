openapi: 3.0.3
info:
  title: "E - Activités d'une collectivité et de la fédération"
  description: >
    Gestion des activités planifiées au niveau des collectivités et de la fédération.
    Deux activités obligatoires récurrentes : l'assemblée générale mensuelle (tous les membres)
    et la formation obligatoire pour les juniors. Les collectivités peuvent aussi organiser
    des activités exceptionnelles. La fédération peut planifier des activités auxquelles
    les collectivités sont invitées.
  version: 1.0.0

servers:
  - url: https://localhost:8080

paths:

  /collectivites/{collectivite_id}/activites:
    post:
      tags: [E - Activités]
      summary: Créer une activité pour une collectivité
      description: >
        Crée une activité planifiée pour la collectivité. Le type détermine
        les règles de présence : ASSEMBLEE_GENERALE_MENSUELLE et FORMATION_JUNIORS
        sont récurrentes (une date de référence annuelle), ACTIVITE_EXCEPTIONNELLE
        est ponctuelle avec une liste de membres convoqués configurable.
      operationId: creerActiviteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreationActiviteRequest'
            examples:
              assemblee_generale:
                summary: Assemblée générale mensuelle
                value:
                  type_activite: "ASSEMBLEE_GENERALE_MENSUELLE"
                  date: "2026-04-12T09:00:00"
                  cible: "TOUS"
                  obligatoire: true
                  description: "Assemblée générale du mois d'avril 2026"
              formation_juniors:
                summary: Formation obligatoire juniors
                value:
                  type_activite: "FORMATION_JUNIORS"
                  date: "2026-04-25T08:00:00"
                  cible: "JUNIORS"
                  obligatoire: true
                  description: "Formation technique riziculture — techniques d'irrigation"
              activite_exceptionnelle:
                summary: Activité exceptionnelle
                value:
                  type_activite: "ACTIVITE_EXCEPTIONNELLE"
                  date: "2026-05-10T10:00:00"
                  cible: "CERTAINS_MEMBRES"
                  membres_concernes: ["MBR-001", "MBR-002", "MBR-007"]
                  obligatoire: false
                  description: "Formation sur les nouvelles variétés de riz"
      responses:
        '201':
          description: Activité créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    get:
      tags: [E - Activités]
      summary: Lister les activités d'une collectivité
      operationId: listerActivitesCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: type_activite
          in: query
          description: Filtrer par type d'activité
          schema:
            $ref: '#/components/schemas/TypeActivite'
        - name: statut
          in: query
          description: Filtrer par statut de l'activité
          schema:
            $ref: '#/components/schemas/StatutActivite'
        - name: date_debut
          in: query
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste paginée des activités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageActivites'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/activites/{activite_id}:
    get:
      tags: [E - Activités]
      summary: Obtenir le détail d'une activité
      operationId: obtenirActiviteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      responses:
        '200':
          description: Détail complet de l'activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [E - Activités]
      summary: Modifier une activité planifiée
      description: >
        Permet de modifier la date, la description ou les membres concernés.
        Seules les activités au statut PLANIFIE peuvent être modifiées.
      operationId: modifierActiviteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificationActiviteRequest'
            example:
              date: "2026-05-10T14:00:00"
              description: "Formation déplacée à 14h au lieu de 10h"
      responses:
        '200':
          description: Activité modifiée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: L'activité ne peut plus être modifiée (déjà terminée ou en cours)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'

    delete:
      tags: [E - Activités]
      summary: Annuler une activité planifiée
      description: Seules les activités au statut PLANIFIE peuvent être annulées.
      operationId: annulerActiviteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/ActiviteId'
      responses:
        '204':
          description: Activité annulée avec succès
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Impossible d'annuler une activité déjà terminée ou en cours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'

  /federation/activites:
    post:
      tags: [E - Activités Fédération]
      summary: Créer une activité au niveau de la fédération
      description: >
        La fédération planifie une activité à laquelle les collectivités sont invitées.
        Peut être obligatoire (ex : assemblée générale annuelle) ou facultative.
      operationId: creerActiviteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreationActiviteFederationRequest'
            example:
              type_activite: "ASSEMBLEE_FEDERATION"
              date: "2026-12-06T09:00:00"
              lieu: "Antananarivo — Palais des Congrès"
              obligatoire: true
              description: "Assemblée générale annuelle de toutes les collectivités — bilan 2026"
              collectivites_invitees: []
      responses:
        '201':
          description: Activité fédérale créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteFederationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

    get:
      tags: [E - Activités Fédération]
      summary: Lister les activités de la fédération
      operationId: listerActivitesFederation
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: statut
          in: query
          schema:
            $ref: '#/components/schemas/StatutActivite'
        - name: obligatoire
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Liste paginée des activités fédérales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageActivitesFederation'

  /federation/activites/{activite_id}:
    get:
      tags: [E - Activités Fédération]
      summary: Obtenir le détail d'une activité fédérale
      operationId: obtenirActiviteFederation
      parameters:
        - $ref: '#/components/parameters/ActiviteId'
      responses:
        '200':
          description: Détail de l'activité fédérale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteFederationResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [E - Activités Fédération]
      summary: Modifier une activité fédérale planifiée
      operationId: modifierActiviteFederation
      parameters:
        - $ref: '#/components/parameters/ActiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificationActiviteRequest'
      responses:
        '200':
          description: Activité modifiée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteFederationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [E - Activités Fédération]
      summary: Annuler une activité fédérale
      operationId: annulerActiviteFederation
      parameters:
        - $ref: '#/components/parameters/ActiviteId'
      responses:
        '204':
          description: Activité annulée avec succès
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    CollectiviteId:
      name: collectivite_id
      in: path
      required: true
      description: Identifiant unique de la collectivité
      schema:
        type: string
        example: "COL-2026-0015"

    ActiviteId:
      name: activite_id
      in: path
      required: true
      description: Identifiant unique de l'activité
      schema:
        type: string
        example: "ACT-2026-045"

    PageParam:
      name: page
      in: query
      description: Numéro de page (commence à 0)
      schema:
        type: integer
        default: 0
        minimum: 0

    LimitParam:
      name: limit
      in: query
      description: Nombre d'éléments par page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:
    TypeActivite:
      type: string
      enum:
        - ASSEMBLEE_GENERALE_MENSUELLE
        - FORMATION_JUNIORS
        - ACTIVITE_EXCEPTIONNELLE
        - ASSEMBLEE_FEDERATION
      description: >
        - ASSEMBLEE_GENERALE_MENSUELLE : obligatoire pour tous, date fixée annuellement
        - FORMATION_JUNIORS : obligatoire pour les juniors, date fixée annuellement
        - ACTIVITE_EXCEPTIONNELLE : ponctuelle, cible et obligation définies par la collectivité
        - ASSEMBLEE_FEDERATION : activité planifiée par la fédération

    StatutActivite:
      type: string
      enum: [PLANIFIE, EN_COURS, TERMINE, ANNULE]

    CibleActivite:
      type: string
      enum: [TOUS, JUNIORS, CERTAINS_MEMBRES]
      description: >
        - TOUS : tous les membres de la collectivité sont convoqués
        - JUNIORS : uniquement les membres juniors
        - CERTAINS_MEMBRES : liste spécifique définie dans membres_concernes

    CreationActiviteRequest:
      type: object
      required: [type_activite, date, obligatoire]
      properties:
        type_activite:
          $ref: '#/components/schemas/TypeActivite'
        date:
          type: string
          format: date-time
          description: Date et heure de l'activité
        cible:
          $ref: '#/components/schemas/CibleActivite'
          default: TOUS
        obligatoire:
          type: boolean
          description: La présence est-elle obligatoire pour les membres convoqués ?
        membres_concernes:
          type: array
          description: Requis uniquement si cible = CERTAINS_MEMBRES
          items:
            type: string
        description:
          type: string
          description: Description ou thème de l'activité

    CreationActiviteFederationRequest:
      type: object
      required: [type_activite, date, obligatoire]
      properties:
        type_activite:
          $ref: '#/components/schemas/TypeActivite'
        date:
          type: string
          format: date-time
        lieu:
          type: string
          description: Lieu de l'activité
        obligatoire:
          type: boolean
        collectivites_invitees:
          type: array
          description: Liste des collectivités invitées (vide = toutes les collectivités)
          items:
            type: string
        description:
          type: string

    ModificationActiviteRequest:
      type: object
      properties:
        date:
          type: string
          format: date-time
        description:
          type: string
        membres_concernes:
          type: array
          items:
            type: string

    ActiviteResponse:
      type: object
      properties:
        id:
          type: string
          example: "ACT-2026-045"
        collectivite_id:
          type: string
        type_activite:
          $ref: '#/components/schemas/TypeActivite'
        date:
          type: string
          format: date-time
        cible:
          $ref: '#/components/schemas/CibleActivite'
        obligatoire:
          type: boolean
        statut:
          $ref: '#/components/schemas/StatutActivite'
        nombre_membres_convoques:
          type: integer
        description:
          type: string

    ActiviteFederationResponse:
      type: object
      properties:
        id:
          type: string
        type_activite:
          $ref: '#/components/schemas/TypeActivite'
        date:
          type: string
          format: date-time
        lieu:
          type: string
        obligatoire:
          type: boolean
        statut:
          $ref: '#/components/schemas/StatutActivite'
        nombre_collectivites_invitees:
          type: integer
        description:
          type: string

    PageActivites:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ActiviteResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    PageActivitesFederation:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ActiviteFederationResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer

    Erreur:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'

    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'

    Forbidden:
      description: Action non autorisée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
          example:
            code: "FORBIDDEN"
            message: "Seul le président ou le secrétaire peut gérer les activités"