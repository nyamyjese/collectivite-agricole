openapi: 3.0.3
info:
  title: "E - Activités d'une collectivité et de la fédération"
  description: >
    Gestion des activités planifiées au niveau des collectivités et de la fédération.
    Deux activités obligatoires récurrentes : l'assemblée générale mensuelle et la formation obligatoire pour les juniors.
  version: 1.0.0

servers:
  - url: https://localhost:8080

paths:
  /collectivites/{collectivite_id}/activites:
    post:
      tags: [E - Activités]
      summary: Créer une activité pour une collectivité
      operationId: creerActiviteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreationActiviteRequest'
      responses:
        '201':
          description: Activité créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiviteResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    get:
      tags: [E - Activités]
      summary: Lister les activités d'une collectivité
      operationId: listerActivitesCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: type_activite
          in: query
          schema: { $ref: '#/components/schemas/TypeActivite' }
        - name: statut
          in: query
          schema: { $ref: '#/components/schemas/StatutActivite' }
      responses:
        '200':
          description: Liste paginée des activités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageActivites'
        '404': { $ref: '#/components/responses/NotFound' }



components:
  parameters:
    CollectiviteId:
      name: collectivite_id
      in: path
      required: true
      schema:
        type: string
        example: "COL-2026-0015"

    ActiviteId:
      name: activite_id
      in: path
      required: true
      schema:
        type: string
        example: "ACT-2026-045"

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20

  schemas:
    TypeActivite:
      type: string
      enum:
        - ASSEMBLEE_GENERALE_MENSUELLE
        - FORMATION_JUNIORS
        - ACTIVITE_EXCEPTIONNELLE
        - ASSEMBLEE_FEDERATION

    StatutActivite:
      type: string
      enum: [PLANIFIE, EN_COURS, TERMINE, ANNULE]

    CibleActivite:
      type: string
      enum: [TOUS, JUNIORS, CERTAINS_MEMBRES]
      default: TOUS
      description: >
        - TOUS : tous les membres de la collectivité sont convoqués
        - JUNIORS : uniquement les membres juniors
        - CERTAINS_MEMBRES : liste spécifique définie dans membres_concernes

    CreationActiviteRequest:
      type: object
      required: [type_activite, date, obligatoire]
      properties:
        type_activite:
          $ref: '#/components/schemas/TypeActivite'
        date:
          type: string
          format: date-time
        cible:
          $ref: '#/components/schemas/CibleActivite'           # ← corrigé ici
        obligatoire:
          type: boolean
        membres_concernes:
          type: array
          items:
            type: string
        description:
          type: string



    Erreur:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: array
          items: { type: string }

  responses:
    BadRequest: { $ref: '#/components/schemas/Erreur' }   # raccourci propre
    NotFound:   { $ref: '#/components/schemas/Erreur' }
    Forbidden:  { $ref: '#/components/schemas/Erreur' }