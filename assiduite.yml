openapi: 3.0.3
info:
  title: "F - Assiduité des membres"
  description: >
    Gestion des présences à chaque activité d'une collectivité. Le secrétaire en activité
    est responsable de l'enregistrement des présences. Un membre peut être PRESENT, ABSENT
    ou EXCUSE (s'il a informé le secrétaire à l'avance avec un motif). Un membre visiteur
    d'une autre collectivité peut être inscrit sur la feuille, mais sa présence ne compte
    pas dans son taux d'assiduité personnel.
  version: 1.0.0

servers:
  - url: https://localhost:8080

paths:

  /activites/{activite_id}/presences:
    post:
      tags: [F - Assiduité]
      summary: Enregistrer la feuille de présence d'une activité
      description: >
        Le secrétaire en activité soumet la feuille de présence complète après l'activité.
        Pour chaque membre convoqué, il indique le statut (PRESENT, ABSENT, EXCUSE).
        Il peut également ajouter des membres visiteurs d'autres collectivités
        (leur présence est notée mais n'impacte pas leur taux d'assiduité).
      operationId: enregistrerFeuillePresence
      parameters:
        - $ref: '#/components/parameters/ActiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeuillePresenceRequest'
            example:
              presences:
                - membre_id: "MBR-001"
                  statut: "PRESENT"
                - membre_id: "MBR-002"
                  statut: "EXCUSE"
                  motif_absence: "Déplacement professionnel"
                  date_notification: "2026-04-10"
                - membre_id: "MBR-003"
                  statut: "ABSENT"
              visiteurs:
                - membre_id: "MBR-099"
                  collectivite_origine_id: "COL-2026-0003"
      responses:
        '201':
          description: Feuille de présence enregistrée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeuillePresenceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Une feuille de présence a déjà été enregistrée pour cette activité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
              example:
                code: "PRESENCES_ALREADY_RECORDED"
                message: "La feuille de présence de cette activité a déjà été enregistrée"

    get:
      tags: [F - Assiduité]
      summary: Consulter la feuille de présence d'une activité
      operationId: obtenirFeuillePresence
      parameters:
        - $ref: '#/components/parameters/ActiviteId'
        - name: statut
          in: query
          description: Filtrer par statut de présence
          schema:
            $ref: '#/components/schemas/StatutPresence'
      responses:
        '200':
          description: Feuille de présence complète
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeuillePresenceResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /activites/{activite_id}/presences/{membre_id}:
    patch:
      tags: [F - Assiduité]
      summary: Modifier le statut de présence d'un membre
      description: >
        Permet au secrétaire de corriger le statut d'un membre après l'enregistrement
        initial, par exemple pour passer un ABSENT en EXCUSE si le motif est fourni
        après coup.
      operationId: modifierStatutPresence
      parameters:
        - $ref: '#/components/parameters/ActiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificationPresenceRequest'
            example:
              statut: "EXCUSE"
              motif_absence: "Hospitalisation — justificatif fourni après coup"
              date_notification: "2026-04-13"
      responses:
        '200':
          description: Statut de présence mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresenceMembreResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /membres/{membre_id}/taux-assiduite:
    get:
      tags: [F - Assiduité]
      summary: Calculer le taux d'assiduité d'un membre sur une période
      description: >
        Retourne le taux d'assiduité d'un membre pour les activités où il était convoqué
        (cible = TOUS ou CERTAINS_MEMBRES incluant ce membre, ou JUNIORS si le membre est junior).
        Les activités visitées dans d'autres collectivités ne sont PAS comptabilisées.
      operationId: calculerTauxAssiduiteMembre
      parameters:
        - $ref: '#/components/parameters/MembreId'
        - name: collectivite_id
          in: query
          required: true
          description: Identifiant de la collectivité de référence du membre
          schema:
            type: string
        - name: date_debut
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Taux d'assiduité calculé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TauxAssiduiteMembreResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    ActiviteId:
      name: activite_id
      in: path
      required: true
      description: Identifiant unique de l'activité
      schema:
        type: string
        example: "ACT-2026-045"

    MembreId:
      name: membre_id
      in: path
      required: true
      description: Identifiant unique du membre
      schema:
        type: string
        example: "MBR-005"

  schemas:
    StatutPresence:
      type: string
      enum: [PRESENT, ABSENT, EXCUSE]
      description: >
        - PRESENT : membre présent à l'activité
        - ABSENT : membre absent sans notification préalable
        - EXCUSE : membre absent ayant informé le secrétaire à l'avance avec motif

    PresenceMembreRequest:
      type: object
      required: [membre_id, statut]
      properties:
        membre_id:
          type: string
          description: Identifiant du membre
        statut:
          $ref: '#/components/schemas/StatutPresence'
        motif_absence:
          type: string
          description: Motif d'absence — obligatoire si statut = EXCUSE
        date_notification:
          type: string
          format: date
          description: Date à laquelle le membre a informé le secrétaire — requis si EXCUSE

    VisiteurRequest:
      type: object
      required: [membre_id, collectivite_origine_id]
      properties:
        membre_id:
          type: string
          description: Identifiant du membre visiteur
        collectivite_origine_id:
          type: string
          description: Identifiant de la collectivité d'origine du visiteur

    FeuillePresenceRequest:
      type: object
      required: [presences]
      properties:
        presences:
          type: array
          description: Liste des présences des membres convoqués
          minItems: 1
          items:
            $ref: '#/components/schemas/PresenceMembreRequest'
        visiteurs:
          type: array
          description: >
            Membres visiteurs d'autres collectivités — leur présence est notée
            mais ne compte pas dans leur taux d'assiduité personnel.
          items:
            $ref: '#/components/schemas/VisiteurRequest'
          default: []

    ModificationPresenceRequest:
      type: object
      required: [statut]
      properties:
        statut:
          $ref: '#/components/schemas/StatutPresence'
        motif_absence:
          type: string
          description: Obligatoire si le nouveau statut est EXCUSE
        date_notification:
          type: string
          format: date

    PresenceMembreResponse:
      type: object
      properties:
        membre_id:
          type: string
        nom:
          type: string
        prenoms:
          type: string
        statut:
          $ref: '#/components/schemas/StatutPresence'
        motif_absence:
          type: string
        date_notification:
          type: string
          format: date
        est_visiteur:
          type: boolean
          description: True si le membre est d'une autre collectivité
        collectivite_origine_id:
          type: string
          description: Renseigné uniquement si est_visiteur = true

    FeuillePresenceResponse:
      type: object
      properties:
        activite_id:
          type: string
        collectivite_id:
          type: string
        date_activite:
          type: string
          format: date-time
        type_activite:
          type: string
        nombre_convoques:
          type: integer
          description: Nombre de membres convoqués (hors visiteurs)
        nombre_presents:
          type: integer
        nombre_absents:
          type: integer
        nombre_excuses:
          type: integer
        taux_presence:
          type: number
          format: float
          description: Pourcentage de présence sur le total des convoqués
        presences:
          type: array
          items:
            $ref: '#/components/schemas/PresenceMembreResponse'
        visiteurs:
          type: array
          items:
            $ref: '#/components/schemas/PresenceMembreResponse'

    TauxAssiduiteMembreResponse:
      type: object
      properties:
        membre_id:
          type: string
        collectivite_id:
          type: string
        date_debut:
          type: string
          format: date
        date_fin:
          type: string
          format: date
        nombre_activites_convoquees:
          type: integer
          description: Nombre d'activités pour lesquelles ce membre était convoqué
        nombre_presences:
          type: integer
        nombre_absences:
          type: integer
        nombre_excuses:
          type: integer
        taux_assiduite:
          type: number
          format: float
          description: Taux d'assiduité en pourcentage (présences / convoqués × 100)
          example: 87.5

    Erreur:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Requête invalide — données manquantes ou format incorrect
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
          example:
            code: "VALIDATION_ERROR"
            message: "Le motif est obligatoire pour un statut EXCUSE"

    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
          example:
            code: "NOT_FOUND"
            message: "Activité ou membre introuvable"

    Forbidden:
      description: Action réservée au secrétaire en activité
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
          example:
            code: "FORBIDDEN"
            message: "Seul le secrétaire en activité peut gérer les présences"