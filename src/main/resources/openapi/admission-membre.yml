openapi : 3.0.3
info:
  title: "Admission d'un nouveau membre dans une collectivité"
  description: >
    Fonctionnalité gérant l'admission, le changement de collectivité et la
    démission d'un membre. Conditions d'admission : être parrainé par un membre
    confirmé avec plus de 90 jours d'ancienneté, fournir les informations
    personnelles complètes, et régler les frais d'adhésion de 50 000 MGA.
  version: 1.0.

servers:
  - url: https://localhost:8080

paths:

  /collectivites/{collectivite_id}/membres:
    post:
      tags: [Membres]
      summary: Admettre un nouveau membre dans une collectivité
      operationId: admettreMembre
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionMembreRequest'
            example:
              parrain_id: "MBR-005"
              informations_personnelles:
                nom: "Rakoto"
                prenoms: "Jean Pierre"
                date_naissance: "1990-05-14"
                genre: "MASCULIN"
                adresse: "Lot II H 45, Antananarivo"
                metier: "Agriculteur"
                telephone: "+261341234567"
                email: "jean.rakoto@example.mg"
              paiement:
                mode: "MOBILE_MONEY"
                reference_transaction: "OM-2026-789456"
                montant: 50000
      responses:
        '201':
          description: Membre admis avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Conditions d'admission non satisfaites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErreurAdmission'

    get:
      tags: [ Membres ]
      summary: Lister les membres d'une collectivité
      operationId: listerMembres
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: poste
          in: query
          schema:
            $ref: '#/components/schemas/PosteSpecifique'
        - name: statut
          in: query
          schema:
            $ref: '#/components/schemas/StatutMembre'
      responses:
        '200':
          description: Liste des membres
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageMembres'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/membres/{membre_id}:
    get:
      tags: [ Membres ]
      summary: Obtenir le profil d'un membre
      operationId: obtenirMembre
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      responses:
        '200':
          description: Profil complet du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [ Membres ]
      summary: Mettre à jour les informations personnelles d'un membre
      operationId: mettreAJourMembre
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MiseAJourMembreRequest'
      responses:
        '200':
          description: Informations mises à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/membres/{membre_id}/changement-collectivite:
    post:
      tags: [ Membres ]
      summary: Changer un membre de collectivité
      operationId: changerCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangementCollectiviteRequest'
            example:
              nouvelle_collectivite_id: "COL-2026-0015"
              motif: "Déménagement à Fianarantsoa"
      responses:
        '200':
          description: Changement de collectivité effectué
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangementCollectiviteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/membres/{membre_id}/demission:
    post:
      tags: [ Membres ]
      summary: Enregistrer la démission d'un membre
      operationId: enregistrerDemission
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemissionRequest'
            example:
              motif: "Raisons personnelles"
              date_effet: "2026-05-01"
      responses:
        '200':
          description: Démission enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemissionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Le membre est déjà démissionnaire
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'

  /membres/{membre_id}/anteriorite:
    get:
      tags: [ Membres ]
      summary: Vérifier l'antériorité d'un membre dans la fédération
      operationId: verifierAnteriorite
      parameters:
        - $ref: '#/components/parameters/MembreId'
      responses:
        '200':
          description: Résultat de la vérification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultatAnteriorite'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:

    AdmissionMembreRequest:
      type: object
      required: [parrain_id, informations_personnelles, paiement]
      properties:
        parrain_id:
          type: string
          description: Identifiant du parrain (doit être membre confirmé avec > 90 jours d'ancienneté)
          example: "MBR-005"
        informations_personnelles:
          $ref: '#/components/schemas/InformationsPersonnelles'
        paiement:
          $ref: '#/components/schemas/PaiementAdhesion'

    InformationsPersonnelles:
      type: object
      required: [nom, prenoms, date_naissance, genre, adresse, metier, telephone, email]
      properties:
        nom:
          type: string
          example: "Rakoto"
        prenoms:
          type: string
          example: "Jean Pierre"
        date_naissance:
          type: string
          format: date
          example: "1990-05-14"
        genre:
          type: string
          enum: [MASCULIN, FEMININ]
          example: "MASCULIN"
        adresse:
          type: string
          example: "Lot II H 45, Antananarivo"
        metier:
          type: string
          example: "Agriculteur"
        telephone:
          type: string
          pattern: '^\+?[0-9]{9,15}$'
          example: "+261341234567"
        email:
          type: string
          format: email
          example: "jean.rakoto@example.mg"

    PaiementAdhesion:
      type: object
      required: [mode, reference_transaction, montant]
      properties:
        mode:
          type: string
          enum: [MOBILE_MONEY, VIREMENT_BANCAIRE]
          example: "MOBILE_MONEY"
        reference_transaction:
          type: string
          description: Référence de la transaction de paiement
          example: "OM-2026-789456"
        montant:
          type: number
          description: Doit être égal à 50 000 MGA
          example: 50000
          enum: [50000]

    MiseAJourMembreRequest:
      type: object
      description: Tous les champs sont optionnels (PATCH)
      properties:
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
          pattern: '^\+?[0-9]{9,15}$'
        email:
          type: string
          format: email

    ChangementCollectiviteRequest:
      type: object
      required: [nouvelle_collectivite_id]
      properties:
        nouvelle_collectivite_id:
          type: string
          example: "COL-2026-0015"
        motif:
          type: string
          maxLength: 300
          example: "Déménagement à Fianarantsoa"

    ChangementCollectiviteResponse:
      type: object
      properties:
        membre_id:
          type: string
        ancienne_collectivite_id:
          type: string
        nouvelle_collectivite_id:
          type: string
        date_changement:
          type: string
          format: date-time
        message:
          type: string
          example: "Changement de collectivité enregistré avec succès."

    DemissionRequest:
      type: object
      properties:
        motif:
          type: string
          maxLength: 300
        date_effet:
          type: string
          format: date
          description: Date effective de la démission (par défaut aujourd'hui)

    DemissionResponse:
      type: object
      properties:
        membre_id:
          type: string
        collectivite_id:
          type: string
        statut:
          type: string
          example: "DEMISSIONNE"
        date_demission:
          type: string
          format: date-time

    MembreResponse:
      type: object
      properties:
        membre_id:
          type: string
          example: "MBR-042"
        informations_personnelles:
          $ref: '#/components/schemas/InformationsPersonnelles'
        poste:
          $ref: '#/components/schemas/PosteSpecifique'
        statut:
          $ref: '#/components/schemas/StatutMembre'
        collectivite_id:
          type: string
          example: "COL-2026-0042"
        date_adhesion:
          type: string
          format: date
        parrain_id:
          type: string
          example: "MBR-005"

    PageMembres:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/MembreResponse'

    ResultatAnteriorite:
      type: object
      properties:
        membre_id:
          type: string
        date_adhesion:
          type: string
          format: date
        jours_anciennete:
          type: integer
          example: 120
        poste:
          $ref: '#/components/schemas/PosteSpecifique'
        condition_parrain_satisfaite:
          type: boolean
          description: true si le membre est confirmé ET a > 90 jours d'ancienneté

    ErreurAdmission:
      type: object
      properties:
        code:
          type: string
          example: "ADMISSION_ERROR"
        message:
          type: string
        details:
          type: array
          items:
            type: string
          example:
            - "Le parrain MBR-005 n'est pas un membre confirmé"
            - "Le parrain n'a que 60 jours d'ancienneté (90 requis)"
            - "Le montant de paiement est invalide (50 000 MGA requis)"

    PosteSpecifique:
      type: string
      enum:
        - PRESIDENT
        - PRESIDENT_ADJOINT
        - TRESORIER
        - SECRETAIRE
        - MEMBRE_CONFIRME
        - MEMBRE_JUNIOR

    StatutMembre:
      type: string
      enum:
        - ACTIF
        - DEMISSIONNE
        - SUSPENDU

    Erreur:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

  parameters:
    CollectiviteId:
      name: collectivite_id
      in: path
      required: true
      schema:
        type: string
      example: "COL-2026-0042"

    MembreId:
      name: membre_id
      in: path
      required: true
      schema:
        type: string
      example: "MBR-042"

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
