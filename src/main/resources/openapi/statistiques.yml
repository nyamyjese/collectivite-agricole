openapi: 3.0.3
info:
  title: "Statistiques d'une collectivité"
  description: >
    Fonctionnalité gérant les statistiques d'une collectivité.
    Le président doit soumettre un rapport mensuel à la fédération comprenant
    le taux d'assiduité global et le nombre de membres inscrits.
    En interne, le président dispose de statistiques détaillées par membre actif
    (non démissionnaire) : taux d'assiduité, montant d'encaissement et
    montant impayé potentiel sur une période donnée.
  version: 1.0.0

servers:
  - url: https://localhost:8080

paths:

  /collectivites/{collectivite_id}/statistiques/rapport-mensuel:
    post:
      tags: [Statistiques]
      summary: Soumettre le rapport mensuel à la fédération
      operationId: soumettreRapportMensuel
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RapportMensuelRequest'
            example:
              periode: "2026-03"
              president_id: "MBR-001"
              taux_assiduite_global: 78.5
              nombre_membres_inscrits: 42
              commentaire: "Légère baisse de l'assiduité due aux récoltes en cours."
      responses:
        '201':
          description: Rapport mensuel soumis avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportMensuelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Action réservée au président
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Un rapport a déjà été soumis pour cette période
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'

    get:
      tags: [ Statistiques ]
      summary: Lister les rapports mensuels soumis à la fédération
      operationId: listerRapportsMensuels
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: annee
          in: query
          schema:
            type: integer
          example: 2026
      responses:
        '200':
          description: Liste des rapports mensuels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageRapportsMensuels'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/statistiques/rapport-mensuel/{periode}:
    get:
      tags: [ Statistiques ]
      summary: Consulter le rapport mensuel d'une période
      operationId: consulterRapportMensuel
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: periode
          in: path
          required: true
          description: Période au format YYYY-MM
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          example: "2026-03"
      responses:
        '200':
          description: Rapport mensuel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportMensuelResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/statistiques/membres:
    get:
      tags: [ Statistiques ]
      summary: Statistiques détaillées par membre actif
      operationId: statistiquesParMembre
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: date_debut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-01-01"
        - name: date_fin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-31"
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: tri
          in: query
          description: Trier les résultats par critère
          schema:
            type: string
            enum:
              - taux_assiduite_asc
              - taux_assiduite_desc
              - montant_encaisse_asc
              - montant_encaisse_desc
              - montant_impaye_desc
      responses:
        '200':
          description: Statistiques détaillées par membre actif
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageStatsMembres'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Accès réservé au président de la collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/statistiques/membres/{membre_id}:
    get:
      tags: [ Statistiques ]
      summary: Statistiques détaillées d'un membre actif spécifique
      operationId: statistiquesMembre
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
        - name: date_debut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-01-01"
        - name: date_fin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-31"
      responses:
        '200':
          description: Statistiques du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsMembre'
        '403':
          description: Accès réservé au président
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/statistiques/resume:
    get:
      tags: [ Statistiques ]
      summary: Résumé statistique global de la collectivité
      operationId: resumeStatistiques
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: date_debut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-01-01"
        - name: date_fin
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-31"
      responses:
        '200':
          description: Résumé statistique
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumeStatistiques'
        '404':
          $ref: '#/components/responses/NotFound'

  /federation/rapports-mensuels:
    get:
      tags: [ Statistiques ]
      summary: Consulter les rapports mensuels de toutes les collectivités
      operationId: rapportsMensuelsFederation
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: collectivite_id
          in: query
          schema:
            type: string
        - name: periode
          in: query
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          example: "2026-03"
        - name: statut
          in: query
          schema:
            type: string
            enum: [ SOUMIS, NON_SOUMIS ]
      responses:
        '200':
          description: Liste des rapports mensuels de toutes les collectivités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageRapportsMensuelsFederation'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  schemas:

    RapportMensuelRequest:
      type: object
      required: [periode, president_id, taux_assiduite_global, nombre_membres_inscrits]
      properties:
        periode:
          type: string
          description: Mois du rapport au format YYYY-MM
          pattern: '^\d{4}-\d{2}$'
          example: "2026-03"
        president_id:
          type: string
          description: Identifiant du président soumettant le rapport
          example: "MBR-001"
        taux_assiduite_global:
          type: number
          format: float
          minimum: 0
          maximum: 100
          description: Taux d'assiduité global de la collectivité (en %)
          example: 78.5
        nombre_membres_inscrits:
          type: integer
          minimum: 0
          description: Nombre total de membres inscrits au moment du rapport
          example: 42
        commentaire:
          type: string
          maxLength: 1000
          example: "Légère baisse de l'assiduité due aux récoltes en cours."

    RapportMensuelResponse:
      type: object
      properties:
        rapport_id:
          type: string
          example: "RPT-COL-2026-0042-2026-03"
        collectivite_id:
          type: string
        periode:
          type: string
          example: "2026-03"
        president_id:
          type: string
        taux_assiduite_global:
          type: number
          format: float
          example: 78.5
        nombre_membres_inscrits:
          type: integer
          example: 42
        commentaire:
          type: string
        date_soumission:
          type: string
          format: date-time

    PageRapportsMensuels:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/RapportMensuelResponse'

    PageRapportsMensuelsFederation:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        collectivites_ayant_soumis:
          type: integer
        collectivites_n_ayant_pas_soumis:
          type: integer
        data:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/RapportMensuelResponse'
              - type: object
                properties:
                  nom_collectivite:
                    type: string
                  localite:
                    type: string

    StatsMembre:
      type: object
      properties:
        membre_id:
          type: string
          example: "MBR-042"
        nom_complet:
          type: string
          example: "Rakoto Jean Pierre"
        poste:
          type: string
          example: "MEMBRE_CONFIRME"
        statut:
          type: string
          example: "ACTIF"
        periode_debut:
          type: string
          format: date
        periode_fin:
          type: string
          format: date
        taux_assiduite:
          type: number
          format: float
          description: Taux d'assiduité sur la période (en %)
          example: 83.33
        montant_encaisse:
          type: number
          description: Montant total des cotisations encaissées sur la période (MGA)
          example: 30000
        montant_impaye_potentiel:
          type: number
          description: >
            Montant estimé des cotisations attendues mais non versées sur la période (MGA).
            Calculé sur la base des cotisations périodiques attendues moins celles encaissées.
          example: 10000
        detail_assiduite:
          type: object
          properties:
            total_activites:
              type: integer
            presents:
              type: integer
            excuses:
              type: integer
            absents:
              type: integer
        detail_cotisations:
          type: array
          description: Détail des cotisations encaissées sur la période
          items:
            type: object
            properties:
              cotisation_id:
                type: string
              date_encaissement:
                type: string
                format: date
              montant:
                type: number
              type_cotisation:
                type: string

    PageStatsMembres:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        periode_debut:
          type: string
          format: date
        periode_fin:
          type: string
          format: date
        data:
          type: array
          items:
            $ref: '#/components/schemas/StatsMembre'

    ResumeStatistiques:
      type: object
      properties:
        collectivite_id:
          type: string
        periode_debut:
          type: string
          format: date
        periode_fin:
          type: string
          format: date
        nombre_membres_actifs:
          type: integer
          description: Membres non démissionnaires
          example: 38
        taux_assiduite_global:
          type: number
          format: float
          description: Taux moyen d'assiduité de tous les membres actifs (%)
          example: 78.5
        total_encaisse:
          type: number
          description: Total des cotisations encaissées sur la période (MGA)
          example: 380000
        total_impaye_potentiel:
          type: number
          description: Total des montants impayés potentiels sur la période (MGA)
          example: 40000

    Erreur:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

  parameters:
    CollectiviteId:
      name: collectivite_id
      in: path
      required: true
      schema:
        type: string
      example: "COL-2026-0042"

    MembreId:
      name: membre_id
      in: path
      required: true
      schema:
        type: string
      example: "MBR-042"

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'
    Forbidden:
      description: Accès non autorisé
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Erreur'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
