openapi: 3.1.0
info:
  title: API de la Fédération des Collectivités Agricoles
  description: |
    # Gestion des versions
    Cette API utilise le versionnement sémantique (MAJEUR.MINEUR.CORRECTIF).
    - v0.0.1 (21 avril 2026) : Création de collectivités (`POST /collectivities`) et de membres (`POST /members`).
    - v0.0.2 (22 avril 2026) : Attribution d'un numéro et d'un nom officiels par la fédération (`PATCH /collectivities/{collectivityId}/identifiers`).
  version: 0.0.2
servers:
  - url: 'https://localhost:8080'
    description: Serveur local de développement

tags:
  - name: Collectivités
    description: Gestion des collectivités agricoles
  - name: Membres
    description: Gestion des membres
  - name: Identifiants officiels
    description: Attribution du numéro et du nom officiels (réservé à la fédération)

paths:
  '/collectivities':
    post:
      tags:
        - Collectivités
      summary: Créer une ou plusieurs collectivités
      description: |
        Soumet une demande de création de collectivité(s). 
        Seuls les identifiants des membres sont fournis. La réponse inclut les informations complètes des membres.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateCollectivity'
            examples:
              creationUneCollectivite:
                summary: Exemple de création d'une collectivité
                value:
                  - location: Ambatondrazaka
                    members:
                      - "MBR-001"
                      - "MBR-002"
                      - "MBR-003"
                      - "MBR-004"
                      - "MBR-005"
                      - "MBR-006"
                      - "MBR-007"
                      - "MBR-008"
                      - "MBR-009"
                      - "MBR-010"
                    federationApproval: true
                    structure:
                      president: "MBR-001"
                      vicePresident: "MBR-002"
                      treasurer: "MBR-003"
                      secretary: "MBR-004"
      responses:
        '201':
          description: Liste des collectivités créées avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivity'
              example:
                - id: "67a1b2c3-d4e5-6789-abcd-ef0123456789"
                  officialNumber: null
                  officialName: null
                  location: Ambatondrazaka
                  structure:
                    president:
                      id: "MBR-001"
                      firstName: Jean
                      lastName: Rakoto
                      # ... autres champs
                    vicePresident:
                      id: "MBR-002"
                      firstName: Marie
                      lastName: Rabe
                    treasurer:
                      id: "MBR-003"
                      firstName: Paul
                      lastName: Razafy
                    secretary:
                      id: "MBR-004"
                      firstName: Jeanne
                      lastName: Randria
                  members: [] # liste complète des membres
        '400':
          description: Requête invalide (approbation fédérale manquante ou structure incomplète)
        '404':
          description: Un ou plusieurs membres référencés sont introuvables

  '/members':
    post:
      tags:
        - Membres
      summary: Créer un ou plusieurs membres
      description: |
        Admettre de nouveaux membres dans une collectivité existante.
        Vérifie les parrains, le paiement des frais d'adhésion et des cotisations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMember'
            examples:
              creationMembre:
                summary: Exemple de création d'un membre junior
                value:
                  - firstName: Lova
                    lastName: Andrianina
                    birthDate: "1998-05-15"
                    gender: FEMALE
                    address: Lot 12 Bis Antananarivo
                    profession: Agricultrice
                    phoneNumber: 261341234567
                    email: lova.andrianina@example.mg
                    occupation: JUNIOR
                    collectivityIdentifier: "67a1b2c3-d4e5-6789-abcd-ef0123456789"
                    referees:
                      - "MBR-005"
                      - "MBR-006"
                    registrationFeePaid: true
                    membershipDuesPaid: true
      responses:
        '201':
          description: Liste des membres créés avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '400':
          description: |
            Erreur de validation :
            - Parrains insuffisants ou non éligibles
            - Paiement des frais d'adhésion ou des cotisations manquant
        '404':
          description: Collectivité ou membre introuvable

  '/collectivities/{collectivityId}/identifiers':
    patch:
      tags:
        - Identifiants officiels
      summary: Attribuer un numéro et un nom officiels à une collectivité
      description: |
        **Fonctionnalité J (ajoutée le 22 avril 2026)**  
        Réservé à la fédération. Permet d'assigner un numéro unique (ex: COL-NAT-2026-001) et un nom officiel 
        à une collectivité existante. Une fois attribués, ces champs ne peuvent plus être modifiés.
      parameters:
        - name: collectivityId
          in: path
          required: true
          description: Identifiant interne de la collectivité (généré lors de la création)
          schema:
            type: string
            example: "67a1b2c3-d4e5-6789-abcd-ef0123456789"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - officialNumber
                - officialName
              properties:
                officialNumber:
                  type: string
                  description: Numéro officiel unique attribué par la fédération
                  example: "COL-NAT-2026-001"
                officialName:
                  type: string
                  description: Nom officiel de la collectivité (doit être unique)
                  example: "Collectivité Rizicole du Lac Alaotra"
            examples:
              attributionReussie:
                summary: Exemple d'attribution d'identifiants
                value:
                  officialNumber: "COL-NAT-2026-001"
                  officialName: "Collectivité Rizicole du Lac Alaotra"
      responses:
        '200':
          description: Identifiants attribués avec succès. Retourne la collectivité mise à jour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
              example:
                id: "67a1b2c3-d4e5-6789-abcd-ef0123456789"
                officialNumber: "COL-NAT-2026-001"
                officialName: "Collectivité Rizicole du Lac Alaotra"
                location: Ambatondrazaka
                structure:
                  president:
                    id: "MBR-001"
                    firstName: Jean
                    lastName: Rakoto
                    # ...
                members: []
        '400':
          description: Requête invalide (champs requis manquants ou identifiants déjà utilisés)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "DUPLICATE_IDENTIFIERS"
                message: "Le numéro ou le nom officiel est déjà utilisé par une autre collectivité."
        '403':
          description: Action interdite – seuls les membres de la fédération peuvent attribuer ces identifiants.
        '404':
          description: Collectivité introuvable.
        '409':
          description: Les identifiants ont déjà été attribués et ne peuvent plus être modifiés.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "IDENTIFIERS_ALREADY_ASSIGNED"
                message: "Cette collectivité possède déjà un numéro et un nom officiels. Ils ne peuvent pas être changés."

components:
  schemas:
    CreateCollectivity:
      type: object
      description: Données nécessaires à la création d'une collectivité
      required:
        - location
        - members
        - federationApproval
        - structure
      properties:
        location:
          type: string
          description: Ville ou localité où la collectivité exerce
          example: "Ambatondrazaka"
        members:
          type: array
          description: Liste des identifiants des membres fondateurs (minimum 10)
          minItems: 10
          items:
            $ref: '#/components/schemas/MemberIdentifier'
        federationApproval:
          type: boolean
          description: Indique si la fédération a donné son approbation formelle
          example: true
        structure:
          $ref: '#/components/schemas/CreateCollectivityStructure'
          description: Désignation des membres occupant les postes spécifiques

    CreateCollectivityStructure:
      type: object
      description: Identifiants des membres occupant les postes de direction
      required:
        - president
        - vicePresident
        - treasurer
        - secretary
      properties:
        president:
          $ref: '#/components/schemas/MemberIdentifier'
        vicePresident:
          $ref: '#/components/schemas/MemberIdentifier'
        treasurer:
          $ref: '#/components/schemas/MemberIdentifier'
        secretary:
          $ref: '#/components/schemas/MemberIdentifier'

    CollectivityStructure:
      type: object
      description: Informations détaillées des membres occupant les postes de direction
      properties:
        president:
          $ref: '#/components/schemas/Member'
        vicePresident:
          $ref: '#/components/schemas/Member'
        treasurer:
          $ref: '#/components/schemas/Member'
        secretary:
          $ref: '#/components/schemas/Member'

    Collectivity:
      type: object
      description: Représentation complète d'une collectivité
      properties:
        id:
          type: string
          description: Identifiant interne unique généré par le système
          example: "67a1b2c3-d4e5-6789-abcd-ef0123456789"
        officialNumber:
          type: string
          nullable: true
          description: Numéro officiel attribué par la fédération (peut être null)
          example: "COL-NAT-2026-001"
        officialName:
          type: string
          nullable: true
          description: Nom officiel attribué par la fédération (peut être null)
          example: "Collectivité Rizicole du Lac Alaotra"
        location:
          type: string
          description: Localité de la collectivité
          example: "Ambatondrazaka"
        structure:
          $ref: '#/components/schemas/CollectivityStructure'
        members:
          type: array
          description: Liste de tous les membres de la collectivité
          items:
            $ref: '#/components/schemas/Member'

    MemberIdentifier:
      type: string
      description: Identifiant unique d'un membre
      example: "MBR-001"

    CreateMember:
      type: object
      description: Données pour l'admission d'un nouveau membre
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      required:
        - collectivityIdentifier
        - referees
        - registrationFeePaid
        - membershipDuesPaid
      properties:
        collectivityIdentifier:
          type: string
          description: Identifiant de la collectivité d'accueil
          example: "67a1b2c3-d4e5-6789-abcd-ef0123456789"
        referees:
          type: array
          description: Liste des identifiants des parrains (minimum 2 membres confirmés)
          minItems: 2
          items:
            $ref: '#/components/schemas/MemberIdentifier'
        registrationFeePaid:
          type: boolean
          description: Frais d'adhésion de 50 000 MGA acquittés
          example: true
        membershipDuesPaid:
          type: boolean
          description: Cotisations annuelles obligatoires acquittées
          example: true

    MemberInformation:
      type: object
      description: Informations personnelles d'un membre
      required:
        - firstName
        - lastName
        - birthDate
        - gender
        - address
        - profession
        - phoneNumber
        - email
        - occupation
      properties:
        firstName:
          type: string
          description: Prénom
          example: "Lova"
        lastName:
          type: string
          description: Nom de famille
          example: "Andrianina"
        birthDate:
          type: string
          format: date
          description: Date de naissance (YYYY-MM-DD)
          example: "1998-05-15"
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string
          description: Adresse complète
          example: "Lot 12 Bis Antananarivo"
        profession:
          type: string
          description: Métier exercé
          example: "Agricultrice"
        phoneNumber:
          type: integer
          description: Numéro de téléphone au format international (sans +)
          example: 261341234567
        email:
          type: string
          format: email
          description: Adresse email valide
          example: "lova.andrianina@example.mg"
        occupation:
          $ref: '#/components/schemas/MemberOccupation'

    Member:
      type: object
      description: Représentation complète d'un membre
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      properties:
        id:
          $ref: '#/components/schemas/MemberIdentifier'
        referees:
          type: array
          description: Liste des parrains du membre
          items:
            $ref: '#/components/schemas/Member'

    Gender:
      type: string
      description: Genre du membre
      enum:
        - MALE
        - FEMALE

    MemberOccupation:
      type: string
      description: Poste occupé dans la collectivité
      enum:
        - JUNIOR
        - SENIOR
        - SECRETARY
        - TREASURER
        - VICE_PRESIDENT
        - PRESIDENT

    Error:
      type: object
      description: Structure standard d'une réponse d'erreur
      properties:
        code:
          type: string
          description: Code d'erreur métier
          example: "IDENTIFIERS_ALREADY_ASSIGNED"
        message:
          type: string
          description: Message explicatif en français
          example: "Cette collectivité possède déjà un numéro et un nom officiels. Ils ne peuvent pas être changés."