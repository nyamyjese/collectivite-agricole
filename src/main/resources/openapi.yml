openapi: 3.0.3

info:
  title: "Fédération de Collectivités Agricoles — API REST"
  description: >
    API REST de gestion de la fédération nationale de collectivités agricoles à Madagascar.
    Elle couvre l'intégralité des processus administratifs :
    ouverture de collectivités (A), admission et gestion des membres (B + B-2),
    cotisations et paiements (C), trésorerie (D), activités (E),
    assiduité (F), statistiques collectivité (G) et statistiques fédération (H).
    Mise à jour du 21 avril 2026 : nouvelles conditions d'admission (B-2) et
    statistiques globales de la fédération (H).
  version: 2.0.0

servers:
  - url: https://localhost:8080

tags:
  - name: "A - Ouverture collectivité"
    description: Demande, instruction et autorisation d'ouverture d'une nouvelle collectivité agricole
  - name: "B - Membres"
    description: >
      Admission, gestion, changement de collectivité et démission des membres.
      Inclut les nouvelles conditions d'admission B-2 (2 parrains confirmés minimum,
      cotisations annuelles obligatoires à régler dès l'inscription).
  - name: "C - Cotisations"
    description: Encaissements périodiques et ponctuels, reversements à la fédération
  - name: "D - Trésorerie"
    description: Gestion des comptes (caisse, bancaire, mobile money) des collectivités et de la fédération
  - name: "E - Activités"
    description: Planification et gestion des activités des collectivités et de la fédération
  - name: "F - Assiduité"
    description: Feuilles de présence, suivi des excuses et calcul du taux d'assiduité
  - name: "G - Statistiques collectivité"
    description: Rapports mensuels et statistiques détaillées par membre au niveau collectivité
  - name: "H - Statistiques fédération"
    description: >
      Nouveau (21 avril 2026). Rapport global mensuel et annuel établi par le secrétaire
      de la fédération, regroupant les données clés de toutes les collectivités.

paths:


  /collectivites:
    post:
      tags: ["A - Ouverture collectivité"]
      summary: Soumettre une demande d'ouverture de collectivité
      description: >
        Conditions vérifiées automatiquement :
        - Au moins 10 membres inscrits dont 5 ayant 6 mois d'antériorité dans la fédération
        - Les 4 postes spécifiques pourvus (pouvant être inclus dans les 10)
        - Localité et spécialité agricole renseignées
        - Autorisation formelle de la fédération requise
      operationId: soumettreDemandeOuverture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandeOuvertureRequest'
            example:
              nom: "Collectivité Riziculture Ambatondrazaka"
              localite: "Ambatondrazaka"
              specialite_agricole: "RIZICULTURE"
              membres:
                - membre_id: "MBR-001"
                  poste: "PRESIDENT"
                - membre_id: "MBR-002"
                  poste: "PRESIDENT_ADJOINT"
                - membre_id: "MBR-003"
                  poste: "TRESORIER"
                - membre_id: "MBR-004"
                  poste: "SECRETAIRE"
                - membre_id: "MBR-005"
                  poste: "MEMBRE_CONFIRME"
      responses:
        '201':
          description: Demande soumise — en attente d'autorisation de la fédération
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Conditions d'éligibilité non satisfaites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErreurEligibilite'

    get:
      tags: ["A - Ouverture collectivité"]
      summary: Lister toutes les collectivités
      operationId: listerCollectivites
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: statut
          in: query
          schema:
            $ref: '#/components/schemas/StatutCollectivite'
        - name: localite
          in: query
          schema:
            type: string
        - name: specialite_agricole
          in: query
          schema:
            $ref: '#/components/schemas/SpecialiteAgricole'
      responses:
        '200':
          description: Liste des collectivités
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCollectivites'

  /collectivites/{collectivite_id}:
    get:
      tags: ["A - Ouverture collectivité"]
      summary: Obtenir les détails d'une collectivité
      operationId: obtenirCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      responses:
        '200':
          description: Détails de la collectivité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/eligibilite:
    get:
      tags: ["A - Ouverture collectivité"]
      summary: Vérifier l'éligibilité d'une demande d'ouverture
      operationId: verifierEligibilite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      responses:
        '200':
          description: Résultat du contrôle d'éligibilité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultatEligibilite'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/autorisation:
    post:
      tags: ["A - Ouverture collectivité"]
      summary: Délivrer ou refuser l'autorisation formelle d'ouverture
      operationId: delivrerAutorisation
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecisionAutorisation'
            example:
              decision: "AUTORISEE"
              motif: "Toutes les conditions sont remplies"
      responses:
        '200':
          description: Décision enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectiviteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Une décision a déjà été prise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
              example:
                code: "DECISION_DEJA_PRISE"
                message: "Une décision d'autorisation a déjà été enregistrée pour cette collectivité"


  /collectivites/{collectivite_id}/membres:
    post:
      tags: ["B - Membres"]
      summary: Admettre un nouveau membre dans une collectivité
      description: >
        ## Nouvelles conditions d'admission (B-2) — 21 avril 2026

        **1. Parrains — minimum 2 membres confirmés :**
        Règle : parrains_collectivite_cible ≥ parrains_autres_collectivites

        - ✅ Cas 1 : 2 parrains de la coll. 1 → 2 ≥ 0 → autorisé
        - ✅ Cas 2 : 1 parrain coll.1 + 1 parrain coll.2 → 1 ≥ 1 → autorisé
        - ✅ Cas 3 : 3 parrains coll.1 + 2 parrains autres → 3 ≥ 2 → autorisé
        - ❌ Cas 4 : 0 parrain coll.1 + 2 parrains coll.2 → 0 ≥ 2 → refusé

        **2. Informations personnelles** avec la nature de la relation avec chaque parrain.

        **3. Paiement :**
        - Frais d'adhésion : 50 000 MGA (mobile money ou virement bancaire uniquement)
        - Cotisations annuelles obligatoires imposées par la collectivité (montant variable)
      operationId: admettreMembre
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionMembreRequest'
            example:
              parrains:
                - membre_id: "MBR-010"
                  relation: "COLLEGUE"
                  collectivite_id: "COL-2026-0015"
                - membre_id: "MBR-022"
                  relation: "AMI"
                  collectivite_id: "COL-2026-0015"
              informations_personnelles:
                nom: "Rakoto"
                prenoms: "Jean Pierre"
                date_naissance: "1995-03-20"
                genre: "MASCULIN"
                adresse: "Lot II H 45, Ambatondrazaka"
                metier: "Agriculteur"
                telephone: "+261341234567"
                email: "jean.rakoto@example.mg"
              paiement:
                mode: "MOBILE_MONEY"
                reference_transaction_adhesion: "OM-2026-789456"
                montant_adhesion: 50000
                reference_transaction_cotisations: "OM-2026-789457"
                montant_cotisations_annuelles: 200000
      responses:
        '201':
          description: Membre admis avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Conditions d'admission non satisfaites (B-2)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErreurAdmission'

    get:
      tags: ["B - Membres"]
      summary: Lister les membres d'une collectivité
      operationId: listerMembres
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: poste
          in: query
          schema:
            $ref: '#/components/schemas/PosteSpecifique'
        - name: statut
          in: query
          schema:
            $ref: '#/components/schemas/StatutMembre'
      responses:
        '200':
          description: Liste des membres
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageMembres'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/membres/{membre_id}:
    get:
      tags: ["B - Membres"]
      summary: Obtenir le profil d'un membre
      operationId: obtenirMembre
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      responses:
        '200':
          description: Profil complet du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: ["B - Membres"]
      summary: Mettre à jour les informations personnelles d'un membre
      operationId: mettreAJourMembre
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MiseAJourMembreRequest'
      responses:
        '200':
          description: Informations mises à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/membres/{membre_id}/changement-collectivite:
    post:
      tags: ["B - Membres"]
      summary: Changer un membre de collectivité
      operationId: changerCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangementCollectiviteRequest'
            example:
              nouvelle_collectivite_id: "COL-2026-0020"
              motif: "Déménagement à Fianarantsoa"
      responses:
        '200':
          description: Changement effectué
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/membres/{membre_id}/demission:
    post:
      tags: ["B - Membres"]
      summary: Enregistrer la démission d'un membre
      operationId: enregistrerDemission
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemissionRequest'
            example:
              motif: "Raisons personnelles"
              date_effet: "2026-05-01"
      responses:
        '200':
          description: Démission enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembreResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Le membre est déjà démissionnaire
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
              example:
                code: "DEJA_DEMISSIONNAIRE"
                message: "Ce membre a déjà démissionné"

  /membres/{membre_id}/anteriorite:
    get:
      tags: ["B - Membres"]
      summary: Vérifier l'antériorité d'un membre dans la fédération
      operationId: verifierAnteriorite
      parameters:
        - $ref: '#/components/parameters/MembreId'
      responses:
        '200':
          description: Résultat de la vérification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultatAnteriorite'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/cotisations-annuelles:
    get:
      tags: ["B - Membres"]
      summary: Consulter le montant des cotisations annuelles d'une collectivité
      description: >
        Retourne le montant des cotisations annuelles imposées par la collectivité.
        Ce montant doit être réglé intégralement par tout nouveau candidat lors de
        l'admission (B-2), en plus des frais d'adhésion de 50 000 MGA.
      operationId: obtenirCotisationsAnnuellesCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      responses:
        '200':
          description: Montant des cotisations annuelles obligatoires
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CotisationsAnnuellesResponse'
        '404':
          $ref: '#/components/responses/NotFound'


  /collectivites/{collectivite_id}/cotisations:
    post:
      tags: ["C - Cotisations"]
      summary: Enregistrer un encaissement de cotisation
      description: Seul le trésorier en activité peut enregistrer un encaissement.
      operationId: enregistrerCotisation
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncaissementCotisationRequest'
            example:
              membre_id: "MBR-005"
              type: "PERIODIQUE_MENSUELLE"
              montant: 25000
              mode_paiement: "MOBILE_MONEY"
              reference_transaction: "OM-2026-112233"
              date_encaissement: "2026-04-20"
      responses:
        '201':
          description: Cotisation enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CotisationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    get:
      tags: ["C - Cotisations"]
      summary: Lister les cotisations d'une collectivité
      operationId: listerCotisations
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/TypeCotisation'
        - name: membre_id
          in: query
          schema:
            type: string
        - name: date_debut
          in: query
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste paginée des cotisations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCotisations'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/cotisations/{cotisation_id}:
    get:
      tags: ["C - Cotisations"]
      summary: Obtenir le détail d'une cotisation
      operationId: obtenirCotisation
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/CotisationId'
      responses:
        '200':
          description: Détail de la cotisation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CotisationResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/cotisations/reversements:
    get:
      tags: ["C - Cotisations"]
      summary: Consulter les reversements à la fédération
      operationId: consulterReversements
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: date_debut
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Détail des reversements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReversementsFederationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /membres/{membre_id}/cotisations:
    get:
      tags: ["C - Cotisations"]
      summary: Lister les cotisations d'un membre
      operationId: listerCotisationsMembre
      parameters:
        - $ref: '#/components/parameters/MembreId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: date_debut
          in: query
          schema:
            type: string
            format: date
        - name: date_fin
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Liste paginée des cotisations du membre
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCotisations'
        '404':
          $ref: '#/components/responses/NotFound'


  /collectivites/{collectivite_id}/comptes:
    post:
      tags: ["D - Trésorerie"]
      summary: Ajouter un compte de trésorerie à une collectivité
      description: Une seule CAISSE autorisée (409 si déjà existante). Plusieurs BANCAIRE ou MOBILE_MONEY possibles.
      operationId: ajouterCompteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
            examples:
              caisse:
                summary: Caisse
                value:
                  type_compte: "CAISSE"
                  solde_initial: 0
              bancaire:
                summary: Compte bancaire BOA
                value:
                  type_compte: "BANCAIRE"
                  nom_titulaire: "Collectivité Riziculture Ambatondrazaka"
                  banque: "BOA"
                  numero_compte: "00005000010000000012345"
                  solde_initial: 500000
              mobile_money:
                summary: Orange Money
                value:
                  type_compte: "MOBILE_MONEY"
                  nom_titulaire: "Rakoto Jean Pierre"
                  service_mobile_money: "ORANGE_MONEY"
                  numero_telephone: "+261341234567"
                  solde_initial: 0
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Une caisse existe déjà
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
              example:
                code: "CAISSE_ALREADY_EXISTS"
                message: "Cette collectivité possède déjà une caisse"

    get:
      tags: ["D - Trésorerie"]
      summary: Consulter la situation de trésorerie d'une collectivité
      operationId: consulterTresorerieCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - name: type_compte
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompte'
      responses:
        '200':
          description: Situation complète de trésorerie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SituationTresorerieResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivites/{collectivite_id}/comptes/{compte_id}:
    get:
      tags: ["D - Trésorerie"]
      summary: Détail d'un compte
      operationId: obtenirCompteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/CompteId'
      responses:
        '200':
          description: Détail du compte avec solde courant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompteResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: ["D - Trésorerie"]
      summary: Mettre à jour le solde d'un compte
      operationId: mettreAJourSoldeCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/CompteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MiseAJourSoldeRequest'
            example:
              solde: 1500000
              date_mise_a_jour: "2026-04-20"
      responses:
        '200':
          description: Solde mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: ["D - Trésorerie"]
      summary: Supprimer un compte
      description: Un compte avec solde non nul ne peut pas être supprimé.
      operationId: supprimerCompteCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/CompteId'
      responses:
        '204':
          description: Compte supprimé
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Solde non nul ou caisse active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'
              example:
                code: "COMPTE_NON_SUPPRIMABLE"
                message: "Ce compte possède encore un solde"

  /federation/comptes:
    post:
      tags: ["D - Trésorerie"]
      summary: Ajouter un compte de trésorerie à la fédération
      operationId: ajouterCompteFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompteRequest'
      responses:
        '201':
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Une caisse existe déjà pour la fédération
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erreur'

    get:
      tags: ["D - Trésorerie"]
      summary: Consulter la trésorerie de la fédération
      operationId: consulterTresorerieFederation
      responses:
        '200':
          description: Situation complète de trésorerie de la fédération
          content:
