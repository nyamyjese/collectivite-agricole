components:

  parameters:
    CollectiviteId:
      name: collectivite_id
      in: path
      required: true
      description: Identifiant unique de la collectivité
      schema:
        type: string
        example: "COL-2026-0015"

    MembreId:
      name: membre_id
      in: path
      required: true
      description: Identifiant unique du membre
      schema:
        type: string
        example: "MBR-005"

    ActiviteId:
      name: activite_id
      in: path
      required: true
      description: Identifiant unique de l'activité
      schema:
        type: string
        example: "ACT-2026-045"

    CompteId:
      name: compte_id
      in: path
      required: true
      description: Identifiant unique du compte
      schema:
        type: string
        example: "CPT-2026-001"

    CotisationId:
      name: cotisation_id
      in: path
      required: true
      description: Identifiant unique de la cotisation
      schema:
        type: string
        example: "COT-2026-001"

    PageParam:
      name: page
      in: query
      description: Numéro de page (commence à 0)
      schema:
        type: integer
        default: 0
        minimum: 0

    LimitParam:
      name: limit
      in: query
      description: Nombre d'éléments par page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:


    SpecialiteAgricole:
      type: string
      enum: [RIZICULTURE, APICULTURE, MARAICHAGE, ARBORICULTURE, ELEVAGE, PISCICULTURE, VANILLE, GIROFLE, CACAO, AUTRE]

    StatutCollectivite:
      type: string
      enum: [EN_ATTENTE, AUTORISEE, REFUSEE, ACTIVE, DISSOUTE]

    PosteSpecifique:
      type: string
      enum: [PRESIDENT, PRESIDENT_ADJOINT, TRESORIER, SECRETAIRE, MEMBRE_CONFIRME, MEMBRE_JUNIOR]
      description: >
        PRESIDENT, PRESIDENT_ADJOINT, TRESORIER, SECRETAIRE : uniques par collectivité
        par mandat, max 2 mandats par membre. MEMBRE_CONFIRME et MEMBRE_JUNIOR : illimités.

    StatutMembre:
      type: string
      enum: [ACTIF, DEMISSIONNAIRE]

    RelationParrain:
      type: string
      enum: [FAMILLE, AMI, COLLEGUE, VOISIN, AUTRE]
      description: Nature de la relation candidat–parrain (obligatoire depuis B-2)

    TypeCotisation:
      type: string
      enum: [PERIODIQUE_MENSUELLE, PERIODIQUE_ANNUELLE, PONCTUELLE]
      description: PERIODIQUE_* → un % reversé à la fédération. PONCTUELLE → rien reversé.

    ModePaiement:
      type: string
      enum: [ESPECE, VIREMENT_BANCAIRE, MOBILE_MONEY]

    TypeCompte:
      type: string
      enum: [CAISSE, BANCAIRE, MOBILE_MONEY]
      description: CAISSE unique par entité. BANCAIRE et MOBILE_MONEY illimités.

    NomBanque:
      type: string
      enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]

    ServiceMobileMoney:
      type: string
