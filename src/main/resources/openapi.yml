openapi: 3.0.3
info:
  title: Agricultural Federation API
  description: |
    API REST de gestion de la fédération nationale de collectivités agricoles à Madagascar.

    ## Gestion des versions
    - **v0.0.1** (21/04/2026) : Création de collectivités (`POST /collectivities`) et admission de membres (`POST /members`).
    - **v0.0.2** (22/04/2026) : Attribution d'un numéro et d'un nom officiels (`PUT /collectivities/{id}/informations`).
    - **v0.0.3** (22/04/2026) : Cotisations et transactions (`POST /collectivities/{id}/membershipFees`, `GET /collectivities/{id}/membershipFees`, `GET /collectivities/{id}/transactions`, `POST /members/{id}/payments`).
    - **v0.0.4** (23/04/2026) : Détail d'une collectivité (`GET /collectivities/{id}`) et consultation des comptes financiers (`GET /collectivities/{id}/financialAccounts`).
  version: 0.0.4
servers:
  - url: http://localhost:8080
    description: Serveur local de développement
  - url: https://api.federation-agricole.mg
    description: Serveur de production
tags:
  - name: Collectivités
    description: Gestion des collectivités agricoles
  - name: Membres
    description: Gestion des membres et de leurs paiements
  - name: Cotisations
    description: Gestion des cotisations (membership fees)
  - name: Transactions
    description: Historique des transactions financières
  - name: Comptes Financiers
    description: Consultation des comptes bancaires, mobile money et caisses

paths:

  /collectivities:
    post:
      tags: [Collectivités]
      summary: Créer une ou plusieurs collectivités
      description: |
        Soumet une demande de création de collectivité(s).
        Seuls les identifiants des membres sont fournis. La réponse inclut les informations complètes des membres.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateCollectivity'
            examples:
              creationCollectivite:
                summary: Exemple de création d'une collectivité
                value:
                  - location: Ambatondrazaka
                    members:
                      - MBR001
                      - MBR002
                      - MBR003
                      - MBR004
                      - MBR005
                      - MBR006
                      - MBR007
                      - MBR008
                      - MBR009
                      - MBR010
                    federationApproval: true
                    structure:
                      president: MBR001
                      vicePresident: MBR002
                      treasurer: MBR003
                      secretary: MBR004
      responses:
        '201':
          description: Liste des collectivités créées
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivities/{id}:
    get:
      tags: [Collectivités]
      summary: Obtenir les détails d'une collectivité
      description: |
        **Nouveau dans la version 0.0.4**
        Retourne la collectivité correspondant à l'identifiant fourni, avec la liste complète de ses membres inscrits.
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
      responses:
        '200':
          description: Détails de la collectivité avec la liste de ses membres
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /collectivities/{id}/informations:
    put:
      tags: [Collectivités]
      summary: Attribuer un numéro et un nom officiels
      description: |
        Action réservée à la fédération. Une fois attribués, ces identifiants ne peuvent plus être modifiés.
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfficialIdentifiersRequest'
            example:
              officialNumber: COL-NAT-2026-001
              officialName: Collectivité Rizicole du Lac Alaotra
      responses:
        '200':
          description: Identifiants attribués avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Identifiants déjà attribués
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: IDENTIFIERS_ALREADY_ASSIGNED
                message: Cette collectivité possède déjà un numéro et un nom officiels.

  /collectivities/{id}/financialAccounts:
    get:
      tags: [Comptes Financiers]
      summary: Obtenir la liste des comptes financiers d'une collectivité
      description: |
        **Nouveau dans la version 0.0.4**
        Retourne la liste des comptes (caisse, service mobile money, banque) d'une collectivité avec leur solde à une date donnée.
        Le paramètre `at` permet de spécifier la date à laquelle on souhaite obtenir le solde.
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
        - name: at
          in: query
          required: true
          description: Date à laquelle on souhaite obtenir le solde des comptes (format ISO 8601 YYYY-MM-DD)
          schema:
            type: string
            format: date
          example: "2026-04-23"
      responses:
        '200':
          description: Liste des comptes financiers avec leur solde à la date spécifiée
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FinancialAccount'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'


  /collectivities/{id}/membershipFees:
    post:
      tags: [Cotisations]
      summary: Créer une ou plusieurs cotisations pour une collectivité
      description: |
        Enregistre une liste de cotisations (périodiques ou ponctuelles) pour une collectivité.
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMembershipFee'
            example:
              - memberId: MBR001
                type: PERIODIQUE_MENSUELLE
                amount: 20000
                paymentMode: MOBILE_MONEY
                transactionReference: OM-2026-001
                collectionDate: "2026-04-23"
      responses:
        '201':
          description: Cotisations créées avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MembershipFee'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    get:
      tags: [Cotisations]
      summary: Récupérer la liste des cotisations d'une collectivité
      description: |
        Retourne la liste des cotisations existantes pour une collectivité, avec possibilité de filtrage.
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
        - name: type
          in: query
          schema:
            type: string
            enum: [PERIODIQUE_MENSUELLE, PERIODIQUE_ANNUELLE, PONCTUELLE]
        - name: memberId
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Liste paginée des cotisations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageMembershipFees'
        '404':
          $ref: '#/components/responses/NotFound'


  /collectivities/{id}/transactions:
    get:
      tags: [Transactions]
      summary: Récupérer l'historique des transactions d'une collectivité
      description: |
        Retourne la liste des transactions financières d'une collectivité pour une période donnée.
      parameters:
        - $ref: '#/components/parameters/CollectivityId'
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-01-01"
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-04-30"
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Liste des transactions pour la période spécifiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageTransactions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'


  /members:
    post:
      tags: [Membres]
      summary: Admettre un ou plusieurs nouveaux membres
      description: |
        Enregistre une liste de nouveaux membres dans une collectivité.
        Vérifie les conditions d'admission (parrains, paiements).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMember'
            example:
              - firstName: Jean
                lastName: Rakoto
                birthDate: "1995-03-20"
                gender: MALE
                address: Lot II H 45, Ambatondrazaka
                profession: Agriculteur
                phoneNumber: 261341234567
                email: jean.rakoto@example.mg
                occupation: JUNIOR
                collectivityIdentifier: COL001
                referees:
                  - MBR010
                  - MBR022
                registrationFeePaid: true
                membershipDuesPaid: true
      responses:
        '201':
          description: Liste des membres créés avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /members/{id}/payments:
    post:
      tags: [Membres]
      summary: Enregistrer un ou plusieurs paiements effectués par un membre
      description: |
        Permet d'enregistrer une liste de paiements (frais d'adhésion, cotisations) effectués par un membre.
      parameters:
        - $ref: '#/components/parameters/MemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreatePayment'
            example:
              - amount: 50000
                paymentMode: MOBILE_MONEY
                transactionReference: OM-2026-789456
                paymentDate: "2026-04-23"
                type: REGISTRATION_FEE
      responses:
        '201':
          description: Paiements enregistrés avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'


components:
  parameters:
    CollectivityId:
      name: id
      in: path
      required: true
      description: Identifiant unique de la collectivité
      schema:
        type: string
      example: "COL001"

    MemberId:
      name: id
      in: path
      required: true
      description: Identifiant unique du membre
      schema:
        type: string
      example: "MBR001"

    PageParam:
      name: page
      in: query
      description: Numéro de la page (commence à 0)
      schema:
        type: integer
        default: 0
        minimum: 0

    LimitParam:
      name: limit
      in: query
      description: Nombre d'éléments par page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  schemas:
    Gender:
      type: string
      enum: [MALE, FEMALE]

    MemberOccupation:
      type: string
      enum: [JUNIOR, SENIOR, SECRETARY, TREASURER, VICE_PRESIDENT, PRESIDENT]

    PaymentMode:
      type: string
      enum: [ESPECE, VIREMENT_BANCAIRE, MOBILE_MONEY]

    FeeType:
      type: string
      enum: [PERIODIQUE_MENSUELLE, PERIODIQUE_ANNUELLE, PONCTUELLE]

    PaymentType:
      type: string
      enum: [REGISTRATION_FEE, MEMBERSHIP_DUE, PONCTUELLE]

    AccountType:
      type: string
      enum: [CAISSE, BANCAIRE, MOBILE_MONEY]


    MemberIdentifier:
      type: string
      description: Identifiant unique d'un membre
      example: "MBR001"

    CreateCollectivityStructure:
      type: object
      required: [president, vicePresident, treasurer, secretary]
      properties:
        president:
          $ref: '#/components/schemas/MemberIdentifier'
        vicePresident:
          $ref: '#/components/schemas/MemberIdentifier'
        treasurer:
          $ref: '#/components/schemas/MemberIdentifier'
        secretary:
          $ref: '#/components/schemas/MemberIdentifier'

    CreateCollectivity:
      type: object
      required: [location, members, federationApproval, structure]
      properties:
        location:
          type: string
          example: "Ambatondrazaka"
        members:
          type: array
          minItems: 10
          items:
            $ref: '#/components/schemas/MemberIdentifier'
        federationApproval:
          type: boolean
        structure:
          $ref: '#/components/schemas/CreateCollectivityStructure'

    CollectivityStructure:
      type: object
      properties:
        president:
          $ref: '#/components/schemas/Member'
        vicePresident:
          $ref: '#/components/schemas/Member'
        treasurer:
          $ref: '#/components/schemas/Member'
        secretary:
          $ref: '#/components/schemas/Member'

    Collectivity:
      type: object
      properties:
        id:
          type: string
          example: "COL001"
        officialNumber:
          type: string
          nullable: true
          example: "COL-NAT-2026-001"
        officialName:
          type: string
          nullable: true
          example: "Collectivité Rizicole du Lac Alaotra"
        location:
          type: string
          example: "Ambatondrazaka"
        structure:
          $ref: '#/components/schemas/CollectivityStructure'

    CollectivityDetail:
      allOf:
        - $ref: '#/components/schemas/Collectivity'
        - type: object
          properties:
            members:
              type: array
              description: Liste de tous les membres inscrits dans cette collectivité
              items:
                $ref: '#/components/schemas/Member'

    OfficialIdentifiersRequest:
      type: object
      required: [officialNumber, officialName]
      properties:
        officialNumber:
          type: string
          example: "COL-NAT-2026-001"
        officialName:
          type: string
          example: "Collectivité Rizicole du Lac Alaotra"


    MemberInformation:
      type: object
      required: [firstName, lastName, birthDate, gender, address, profession, phoneNumber, email, occupation]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string
        profession:
          type: string
        phoneNumber:
          type: integer
        email:
          type: string
          format: email
        occupation:
          $ref: '#/components/schemas/MemberOccupation'

    CreateMember:
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
        - type: object
          required: [collectivityIdentifier, referees, registrationFeePaid, membershipDuesPaid]
          properties:
            collectivityIdentifier:
              type: string
            referees:
              type: array
              minItems: 2
              items:
                $ref: '#/components/schemas/MemberIdentifier'
            registrationFeePaid:
              type: boolean
            membershipDuesPaid:
              type: boolean

    Member:
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
        - type: object
          properties:
            id:
              $ref: '#/components/schemas/MemberIdentifier'
            referees:
              type: array
              items:
                $ref: '#/components/schemas/Member'


    CreateMembershipFee:
      type: object
      required: [memberId, type, amount, paymentMode, collectionDate]
      properties:
        memberId:
          type: string
        type:
          $ref: '#/components/schemas/FeeType'
        amount:
          type: integer
          minimum: 1
        paymentMode:
          $ref: '#/components/schemas/PaymentMode'
        transactionReference:
          type: string
        collectionDate:
          type: string
          format: date

    MembershipFee:
      allOf:
        - $ref: '#/components/schemas/CreateMembershipFee'
        - type: object
          properties:
            id:
              type: string
            federationReversedAmount:
              type: integer
            status:
              type: string
              enum: [ENREGISTRE, REVERSE_FEDERATION]

    PageMembershipFees:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/MembershipFee'
        totalElements:
          type: integer
        totalPages:
          type: integer
        page:
          type: integer
        limit:
          type: integer


    CreatePayment:
      type: object
      required: [amount, paymentMode, paymentDate, type]
      properties:
        amount:
          type: integer
          minimum: 1
        paymentMode:
          $ref: '#/components/schemas/PaymentMode'
        transactionReference:
          type: string
        paymentDate:
          type: string
          format: date
        type:
          $ref: '#/components/schemas/PaymentType'

    Payment:
      allOf:
        - $ref: '#/components/schemas/CreatePayment'
        - type: object
          properties:
            id:
              type: string
            memberId:
              type: string

    Transaction:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        amount:
          type: integer
        type:
          type: string
          enum: [CREDIT, DEBIT]
        description:
          type: string
        paymentMode:
          $ref: '#/components/schemas/PaymentMode'
        reference:
          type: string
        accountId:
          type: string

    PageTransactions:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        totalElements:
          type: integer
        totalPages:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    FinancialAccount:
      type: object
      properties:
        id:
          type: string
          example: "CPT001"
        type:
          $ref: '#/components/schemas/AccountType'
        balance:
          type: integer
          description: Solde du compte à la date spécifiée
        currency:
          type: string
          default: "MGA"
        holderName:
          type: string
          nullable: true
        bankName:
          type: string
          nullable: true
          enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]
        accountNumber:
          type: string
          nullable: true
          pattern: '^\d{23}$'
        mobileMoneyService:
          type: string
          nullable: true
          enum: [ORANGE_MONEY, MVOLA, AIRTEL_MONEY]
        phoneNumber:
          type: string
          nullable: true

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Requête invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: VALIDATION_ERROR
            message: Données invalides

    NotFound:
      description: Ressource non trouvée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: NOT_FOUND
            message: Ressource introuvable

    Forbidden:
      description: Action non autorisée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: FORBIDDEN
            message: Vous n'avez pas les droits nécessaires